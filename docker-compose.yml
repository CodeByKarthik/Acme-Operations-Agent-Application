services:
  backend:
    build:
      context: ./acme-ops-agent
    container_name: backend_acme_ops
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_DOCKER}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_JWT_ALGORITHM: ${KEYCLOAK_JWT_ALGORITHM}
      MCP_HOST: ${MCP_HOST}
      MCP_PORT: ${MCP_PORT}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      mcp:
        condition: service_started
      

  postgres:
    image: postgres:16
    container_name: postgres_acme_ops
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - acme_ops_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    build:
      context: ./acme-ops-agent
    container_name: acme_ops_db_init
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_DOCKER}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_JWT_ALGORITHM: ${KEYCLOAK_JWT_ALGORITHM}
      MCP_HOST: ${MCP_HOST}
      MCP_PORT: ${MCP_PORT}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["./scripts/db_entrypoint.sh"]
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak_acme_ops
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: ${KEYCLOAK_DB_VENDOR}
      KC_DB_URL_HOST: ${KEYCLOAK_DB_HOST}
      KC_DB_URL_PORT: ${KEYCLOAK_DB_PORT}
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      KC_HEALTH_ENABLED: ${KEYCLOAK_HEALTH_ENABLED}
      KC_METRICS_ENABLED: ${KEYCLOAK_METRICS_ENABLED}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./keycloak-realm:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build: ./streamlit-app
    container_name: frontend_acme_ops
    ports:
      - "${STREAMLIT_PORT}:${STREAMLIT_PORT}"
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL_DOCKER}
      KEYCLOAK_URL_DOCKER: ${KEYCLOAK_URL_DOCKER}
      API_DOCKER_URL: ${API_DOCKER_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      REDIRECT_URI: ${REDIRECT_URI}
      API_BASE_URL: ${API_DOCKER_URL}
      STREAMLIT_HOST: ${STREAMLIT_HOST}
      STREAMLIT_PORT: ${STREAMLIT_PORT}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_started

  mcp:
    build:
      context: ./acme-ops-agent
    container_name: mcp_acme_ops
    command: ["python", "-m", "acme_ops_agent.mcp.server"]
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_DOCKER}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_JWT_ALGORITHM: ${KEYCLOAK_JWT_ALGORITHM}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      MCP_HOST: 0.0.0.0
      MCP_PORT: ${MCP_PORT}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started

volumes:
  acme_ops_pgdata: